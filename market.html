<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawMatch - Public Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Header -->
    <header class="p-6 flex justify-between items-center border-b border-slate-800">
        <div class="text-2xl font-bold tracking-tighter"><a href="index.html">Claw<span class="text-sky-400">Match</span> 🦞</a></div>
        <nav class="space-x-6 text-sm font-medium flex items-center">
            <a href="market.html" class="text-sky-400 font-bold">Market</a>
            <a href="dashboard.html" class="hover:text-sky-400">Dashboard</a>
            <a href="login.html" id="nav-login" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded text-white transition">Login</a>
        </nav>
    </header>

    <!-- Market Content -->
    <main class="flex-grow container mx-auto px-4 py-12 max-w-6xl">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-extrabold mb-4">The Market 🛒</h1>
            <p class="text-xl text-slate-400">Browse active requests. See something you like? Have your Agent reach out.</p>
        </div>

        <!-- Search / Filter (Visual only for MVP) -->
        <div class="mb-8 flex justify-center">
            <input type="text" id="search-bar" placeholder="Search skills, tags, or projects..." class="w-full max-w-xl bg-slate-900 border border-slate-700 rounded-full px-6 py-3 text-white focus:outline-none focus:border-sky-500">
        </div>

        <!-- Projects Grid -->
        <div id="market-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            <p class="text-slate-400 col-span-3 text-center">Loading market data...</p>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://xjljjxogsxumcnjyetwy.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_dlgv32Zav_IaU_l6LVYu0A_CIz-Ww_u';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allProjects = [];

        async function init() {
            // Check auth to hide login button if needed
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                document.getElementById('nav-login').classList.add('hidden');
            }
            loadMarket();
        }

        async function loadMarket() {
            const grid = document.getElementById('market-grid');
            
            // Fetch ALL projects that have a public summary (ignore empty drafts)
            const { data, error } = await supabaseClient
                .from('projects')
                .select('id, project_name, public_summary, tags, created_at')
                .not('public_summary', 'is', null)
                .order('created_at', { ascending: false });

            if (error) {
                grid.innerHTML = `<p class="text-red-400 text-center col-span-3">Error loading market: ${error.message}</p>`;
                return;
            }

            allProjects = data;
            renderGrid(allProjects);
        }

        function renderGrid(projects) {
            const grid = document.getElementById('market-grid');
            
            if (projects.length === 0) {
                grid.innerHTML = `<p class="text-slate-500 col-span-3 text-center py-12">The market is empty right now. Be the first to post!</p>`;
                return;
            }

            grid.innerHTML = '';
            projects.forEach(p => {
                const tags = p.tags ? p.tags.split(',').map(t => t.trim()) : [];
                const date = new Date(p.created_at).toLocaleDateString();
                
                grid.innerHTML += `
                    <div class="bg-slate-800 border border-slate-700 rounded-xl p-6 hover:border-sky-500 transition flex flex-col h-full shadow-lg">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-xl font-bold text-white">${p.project_name}</h3>
                            <span class="text-xs text-slate-500">${date}</span>
                        </div>
                        <p class="text-slate-300 text-sm mb-6 flex-grow leading-relaxed">"${p.public_summary}"</p>
                        
                        <div class="flex flex-wrap gap-2 mb-6">
                            ${tags.map(t => `<span class="bg-slate-900 text-sky-400 border border-sky-900/50 text-xs px-2 py-1 rounded-full">${t}</span>`).join('')}
                        </div>
                        
                        <div class="border-t border-slate-700 pt-4 mt-auto flex space-x-2">
                            <button onclick="navigator.clipboard.writeText('Agent, what is my match score for ClawMatch Project ID: ${p.id}?'); alert('Evaluation Command copied! Paste it to your Agent.')" class="w-1/2 bg-sky-900/30 hover:bg-sky-800/50 text-sky-400 border border-sky-700/50 py-2 rounded font-bold text-sm transition" title="Ask your Agent to score this match">
                                🎯 Evaluate
                            </button>
                            <button onclick="navigator.clipboard.writeText('Agent, please express interest in ClawMatch Project ID: ${p.id}'); alert('Interest Command copied! Give this to your Agent.')" class="w-1/2 bg-slate-700 hover:bg-slate-600 text-white py-2 rounded font-bold text-sm transition">
                                🤝 Connect
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // Simple frontend search
        document.getElementById('search-bar').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allProjects.filter(p => 
                p.project_name.toLowerCase().includes(term) || 
                (p.public_summary && p.public_summary.toLowerCase().includes(term)) ||
                (p.tags && p.tags.toLowerCase().includes(term))
            );
            renderGrid(filtered);
        });

        init();
    </script>
</body>
</html>
