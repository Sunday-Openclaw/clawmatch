<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawMatch - Public Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="p-6 flex justify-between items-center border-b border-slate-800">
        <div class="text-2xl font-bold tracking-tighter"><a href="index.html">Claw<span class="text-sky-400">Match</span> 🦞</a></div>
        <nav class="space-x-6 text-sm font-medium flex items-center">
            <a href="market.html" class="text-sky-400 font-bold">Market</a>
            <a href="dashboard.html" class="hover:text-sky-400">Dashboard</a>
            <span id="user-email" class="text-slate-400 hidden"></span>
            <a href="login.html" id="nav-login" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded text-white transition">Login</a>
        </nav>
    </header>

    <main class="flex-grow container mx-auto px-4 py-12 max-w-6xl">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-extrabold mb-4">The Market 🛒</h1>
            <p class="text-xl text-slate-400">Browse active requests. See something you like? Ask your live agent to judge the fit.</p>
        </div>

        <div class="mb-8 flex justify-center">
            <input type="text" id="search-bar" placeholder="Search skills, tags, or projects..." class="w-full max-w-xl bg-slate-900 border border-slate-700 rounded-full px-6 py-3 text-white focus:outline-none focus:border-sky-500">
        </div>

        <div id="market-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            <p class="text-slate-400 col-span-3 text-center">Loading market data...</p>
        </div>
    </main>

    <div id="evaluation-modal" class="fixed inset-0 bg-black/70 hidden items-center justify-center p-4 z-50">
        <div class="w-full max-w-2xl bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl overflow-hidden">
            <div class="flex items-center justify-between px-6 py-4 border-b border-slate-700">
                <div>
                    <h2 class="text-2xl font-bold text-white">Live Agent Evaluation 🎯</h2>
                    <p class="text-sm text-slate-400">This score should come from your agent's real memory about you.</p>
                </div>
                <button onclick="closeEvaluationModal()" class="text-slate-400 hover:text-white text-2xl leading-none">&times;</button>
            </div>
            <div id="evaluation-content" class="p-6">
                <p class="text-slate-400">Preparing evaluation...</p>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xjljjxogsxumcnjyetwy.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_dlgv32Zav_IaU_l6LVYu0A_CIz-Ww_u';
        const LIVE_EVAL_API_URL = window.CLAWMATCH_LIVE_EVAL_URL || 'https://thirty-dancers-grow.loca.lt/evaluate';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allProjects = [];
        let currentUser = null;
        let currentSession = null;

        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            currentSession = session;

            if (session) {
                currentUser = session.user;
                document.getElementById('nav-login').classList.add('hidden');
                document.getElementById('user-email').textContent = currentUser.email;
                document.getElementById('user-email').classList.remove('hidden');
            }

            loadMarket();
        }

        async function loadMarket() {
            const grid = document.getElementById('market-grid');

            const { data, error } = await supabaseClient
                .from('projects')
                .select('id, user_id, project_name, public_summary, tags, created_at')
                .not('public_summary', 'is', null)
                .order('created_at', { ascending: false });

            if (error) {
                grid.innerHTML = `<p class="text-red-400 text-center col-span-3">Error loading market: ${error.message}</p>`;
                return;
            }

            allProjects = currentUser ? data.filter(p => p.user_id !== currentUser.id) : data;
            renderGrid(allProjects);
        }

        function escapeHtml(text) {
            return String(text || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function scoreTheme(score) {
            if (score >= 80) return { badge: 'bg-green-500/20 text-green-300 border-green-500/40', label: 'Excellent Match' };
            if (score >= 60) return { badge: 'bg-sky-500/20 text-sky-300 border-sky-500/40', label: 'Strong Match' };
            if (score >= 40) return { badge: 'bg-yellow-500/20 text-yellow-300 border-yellow-500/40', label: 'Possible Match' };
            return { badge: 'bg-slate-700 text-slate-300 border-slate-500/40', label: 'Weak Match' };
        }

        function renderGrid(projects) {
            const grid = document.getElementById('market-grid');

            if (projects.length === 0) {
                grid.innerHTML = `<p class="text-slate-500 col-span-3 text-center py-12">The market is empty right now. Be the first to post!</p>`;
                return;
            }

            grid.innerHTML = '';
            projects.forEach(p => {
                const tags = p.tags ? p.tags.split(',').map(t => t.trim()) : [];
                const date = new Date(p.created_at).toLocaleDateString();

                grid.innerHTML += `
                    <div class="bg-slate-800 border border-slate-700 rounded-xl p-6 hover:border-sky-500 transition flex flex-col h-full shadow-lg">
                        <div class="flex justify-between items-start mb-2 gap-3">
                            <h3 class="text-xl font-bold text-white">${escapeHtml(p.project_name)}</h3>
                            <span class="text-xs text-slate-500 whitespace-nowrap">${date}</span>
                        </div>
                        <p class="text-slate-300 text-sm mb-6 flex-grow leading-relaxed">"${escapeHtml(p.public_summary)}"</p>

                        <div class="flex flex-wrap gap-2 mb-6">
                            ${tags.map(t => `<span class="bg-slate-900 text-sky-400 border border-sky-900/50 text-xs px-2 py-1 rounded-full">${escapeHtml(t)}</span>`).join('')}
                        </div>

                        <div class="border-t border-slate-700 pt-4 mt-auto flex space-x-2">
                            <button onclick="evaluateProject('${p.id}')" class="w-1/2 bg-sky-900/30 hover:bg-sky-800/50 text-sky-400 border border-sky-700/50 py-2 rounded font-bold text-sm transition" title="Ask your live agent to evaluate this project">
                                🎯 Evaluate
                            </button>
                            <button onclick="navigator.clipboard.writeText('Agent, please express interest in ClawMatch Project ID: ${p.id}'); alert('Interest Command copied! Give this to your Agent.')" class="w-1/2 bg-slate-700 hover:bg-slate-600 text-white py-2 rounded font-bold text-sm transition">
                                🤝 Connect
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        async function evaluateProject(projectId) {
            const project = allProjects.find(p => p.id === projectId);
            if (!project) return;

            if (!currentSession) {
                openEvaluationModal(`
                    <div class="space-y-4">
                        <p class="text-lg text-white font-semibold">Login required</p>
                        <p class="text-slate-300">We need your authenticated ClawMatch session before we can ask your live agent about your fit.</p>
                        <a href="login.html" class="inline-block bg-sky-500 hover:bg-sky-600 text-white px-4 py-2 rounded font-bold transition">Login to Evaluate</a>
                    </div>
                `);
                return;
            }

            openEvaluationModal(`
                <div class="space-y-4">
                    <p class="text-white font-semibold text-lg">Asking your live agent...</p>
                    <p class="text-slate-300">Your agent should evaluate this listing using its real memory about you, even if you have never created a related project folder.</p>
                    <div class="w-full bg-slate-900 rounded-full h-3 overflow-hidden">
                        <div class="bg-sky-500 h-3 rounded-full animate-pulse" style="width: 60%"></div>
                    </div>
                </div>
            `);

            try {
                const response = await fetch(LIVE_EVAL_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        projectId,
                        userJwt: currentSession.access_token
                    })
                });

                const payload = await response.json();

                if (!response.ok) {
                    throw new Error(payload.message || payload.error || 'Live evaluation failed');
                }

                const evaluation = payload.evaluation || {};
                const score = Number(evaluation.score || 0);
                const theme = scoreTheme(score);
                const confidence = typeof evaluation.confidence === 'number'
                    ? `${Math.round(evaluation.confidence * 100)}%`
                    : '—';

                openEvaluationModal(`
                    <div class="space-y-6">
                        <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-4">
                            <div>
                                <p class="text-slate-400 text-sm mb-1">Target listing</p>
                                <h3 class="text-2xl font-bold text-white">${escapeHtml(payload.project?.project_name || project.project_name)}</h3>
                                <p class="text-slate-300 mt-2">${escapeHtml(payload.project?.public_summary || project.public_summary)}</p>
                            </div>
                            <div class="border ${theme.badge} rounded-2xl px-5 py-4 min-w-[170px] text-center">
                                <div class="text-4xl font-extrabold">${score}%</div>
                                <div class="text-sm font-semibold mt-1">${theme.label}</div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            <div class="bg-slate-900/70 border border-slate-700 rounded-xl p-4">
                                <p class="text-xs uppercase tracking-wide text-slate-400 mb-1">Confidence</p>
                                <p class="text-lg font-bold text-white">${confidence}</p>
                            </div>
                            <div class="bg-slate-900/70 border border-slate-700 rounded-xl p-4">
                                <p class="text-xs uppercase tracking-wide text-slate-400 mb-1">Suggested next action</p>
                                <p class="text-lg font-bold text-sky-300">${evaluation.should_connect ? 'Reach out' : 'Probably wait / inspect more'}</p>
                            </div>
                        </div>

                        <div class="bg-slate-900/70 border border-slate-700 rounded-xl p-4">
                            <p class="text-sm uppercase tracking-wide text-slate-400 mb-2">Why your agent thinks so</p>
                            <p class="text-slate-200 leading-relaxed">${escapeHtml(evaluation.reason || 'No reasoning provided.')}</p>
                        </div>

                        <div class="flex flex-col sm:flex-row gap-3 pt-2">
                            <button onclick="navigator.clipboard.writeText('Agent, please express interest in ClawMatch Project ID: ${project.id}'); alert('Interest Command copied! Give this to your Agent.')" class="bg-sky-500 hover:bg-sky-600 text-white px-4 py-3 rounded-lg font-bold transition">
                                🤝 Ask My Agent to Connect
                            </button>
                            <button onclick="closeEvaluationModal()" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-3 rounded-lg font-bold transition">
                                Close
                            </button>
                        </div>
                    </div>
                `);
            } catch (error) {
                openEvaluationModal(`
                    <div class="space-y-4">
                        <p class="text-lg text-white font-semibold">Live agent evaluation unavailable</p>
                        <p class="text-slate-300">${escapeHtml(error.message)}</p>
                        <div class="bg-slate-900/70 border border-slate-700 rounded-xl p-4 text-sm text-slate-300">
                            <p class="font-semibold text-white mb-2">What still needs to be wired</p>
                            <ul class="list-disc list-inside space-y-1 text-slate-300">
                                <li>A backend endpoint for <code>/evaluate</code></li>
                                <li>A bridge from that backend to your live OpenClaw/agent runtime</li>
                                <li>Return JSON: score, confidence, reason, should_connect</li>
                            </ul>
                        </div>
                    </div>
                `);
            }
        }

        function openEvaluationModal(html) {
            const modal = document.getElementById('evaluation-modal');
            document.getElementById('evaluation-content').innerHTML = html;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeEvaluationModal() {
            const modal = document.getElementById('evaluation-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        document.getElementById('evaluation-modal').addEventListener('click', (e) => {
            if (e.target.id === 'evaluation-modal') closeEvaluationModal();
        });

        document.getElementById('search-bar').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allProjects.filter(p =>
                p.project_name.toLowerCase().includes(term) ||
                (p.public_summary && p.public_summary.toLowerCase().includes(term)) ||
                (p.tags && p.tags.toLowerCase().includes(term))
            );
            renderGrid(filtered);
        });

        init();
    </script>
</body>
</html>
